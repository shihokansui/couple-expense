<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💑 ふたりの割り勘</title>
  <style>
    :root {
      --mint: #A8E6CF;
      --mint-dark: #7ECBA8;
      --mint-light: #D4F5E8;
      --lavender: #C8A8E9;
      --lavender-dark: #A880D0;
      --lavender-light: #EAD8FF;
      --bg: #F5F0FF;
      --white: #FFFFFF;
      --text: #4A3F5C;
      --text-light: #8878A0;
      --danger: #FF8FA0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: linear-gradient(135deg, var(--mint) 0%, var(--lavender) 100%);
      padding: 20px 16px 32px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(168, 128, 208, 0.2);
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 4px rgba(100, 70, 140, 0.3);
      letter-spacing: 0.05em;
    }

    header p.subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      margin-top: 4px;
    }

    /* 月ナビ */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: white;
      margin: -16px 16px 0;
      border-radius: 16px;
      padding: 14px 20px;
      box-shadow: 0 4px 16px rgba(168, 128, 208, 0.15);
    }

    .month-nav button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--lavender-light);
      color: var(--lavender-dark);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .month-nav button:hover { background: var(--lavender); color: white; }

    .month-nav .month-label {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      min-width: 120px;
      text-align: center;
    }

    /* メインコンテンツ */
    main {
      padding: 20px 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* 精算サマリー */
    .summary-card {
      background: linear-gradient(135deg, var(--lavender-light) 0%, var(--mint-light) 100%);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(168, 128, 208, 0.12);
    }

    .summary-card h2 {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .settlement {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      padding: 12px;
      background: white;
      border-radius: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(168, 128, 208, 0.08);
    }

    .settlement .amount { color: var(--lavender-dark); font-size: 28px; }
    .settlement.balanced { color: var(--mint-dark); }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      background: white;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(168, 128, 208, 0.06);
    }

    .stat-box .name {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .stat-box .val {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-box.kare .val { color: var(--mint-dark); }
    .stat-box.watashi .val { color: var(--lavender-dark); }

    /* 支出リスト */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-header h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--mint-dark), var(--lavender-dark));
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(168, 128, 208, 0.3);
      transition: all 0.2s;
    }

    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 14px rgba(168, 128, 208, 0.4);
    }

    .expense-list { display: flex; flex-direction: column; gap: 10px; }

    .expense-item {
      background: white;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(168, 128, 208, 0.08);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .expense-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .expense-icon.kare { background: var(--mint-light); }
    .expense-icon.watashi { background: var(--lavender-light); }

    .expense-info { flex: 1; min-width: 0; }

    .expense-info .content {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .expense-info .meta {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 2px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .tag {
      background: var(--bg);
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 10px;
    }

    .expense-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .expense-amount {
      font-size: 16px;
      font-weight: 700;
    }

    .expense-amount.kare { color: var(--mint-dark); }
    .expense-amount.watashi { color: var(--lavender-dark); }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-light);
      padding: 2px 4px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .btn-delete:hover { background: #FFE0E6; color: var(--danger); }

    .btn-edit {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-light);
      padding: 2px 4px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .btn-edit:hover { background: var(--lavender-light); color: var(--lavender-dark); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      font-size: 14px;
    }

    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }

    /* ローディング */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--lavender-light);
      border-top-color: var(--lavender-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* モーダル */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(74, 63, 92, 0.4);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: white;
      border-radius: 28px 28px 0 0;
      padding: 28px 20px 40px;
      width: 100%;
      max-width: 480px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--lavender-light);
      border-radius: 12px;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--lavender);
    }

    /* 誰が払った？ラジオ */
    .tate-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tate-btn {
      padding: 12px;
      border: 2px solid var(--lavender-light);
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
    }

    .tate-btn.selected.kare {
      background: var(--mint-light);
      border-color: var(--mint-dark);
      color: var(--mint-dark);
    }

    .tate-btn.selected.watashi {
      background: var(--lavender-light);
      border-color: var(--lavender-dark);
      color: var(--lavender-dark);
    }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--mint-dark), var(--lavender-dark));
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(168, 128, 208, 0.35);
      transition: all 0.2s;
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(168, 128, 208, 0.45);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-cancel {
      width: 100%;
      padding: 12px;
      background: none;
      color: var(--text-light);
      border: none;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }

    /* トースト */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* 確認ダイアログ */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(74, 63, 92, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .confirm-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .confirm-box {
      background: white;
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 300px;
      width: calc(100% - 48px);
      text-align: center;
      box-shadow: 0 8px 32px rgba(74, 63, 92, 0.2);
    }

    .confirm-box p { font-size: 15px; margin-bottom: 20px; color: var(--text); }
    .confirm-box .bold { font-weight: 700; }

    .confirm-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .confirm-btns button {
      padding: 11px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .confirm-btns .btn-no {
      background: var(--bg);
      color: var(--text-light);
    }

    .confirm-btns .btn-yes {
      background: var(--danger);
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1>💑 ふたりの割り勘</h1>
  <p class="subtitle">義也 & 志穂の支出管理</p>
</header>

<div class="month-nav">
  <button id="prevMonth" aria-label="前の月">‹</button>
  <div class="month-label" id="monthLabel">読み込み中…</div>
  <button id="nextMonth" aria-label="次の月">›</button>
</div>

<main>
  <!-- 精算サマリー -->
  <div class="summary-card">
    <h2>💰 今月の精算</h2>
    <div class="settlement" id="settlementText">
      <div class="spinner" style="margin:8px auto;"></div>
    </div>
    <div class="stats-row">
      <div class="stat-box kare">
        <div class="name">義也が払った</div>
        <div class="val" id="kareTotal">¥0</div>
      </div>
      <div class="stat-box watashi">
        <div class="name">志穂が払った</div>
        <div class="val" id="watashiTotal">¥0</div>
      </div>
    </div>
  </div>

  <!-- 支出リスト -->
  <div class="section-header">
    <h2>📋 支出一覧</h2>
    <button class="btn-add" id="openModal">＋ 追加</button>
  </div>

  <div id="expenseList" class="expense-list">
    <div class="loading">
      <div class="spinner"></div>
      <div>データを読み込み中…</div>
    </div>
  </div>
</main>

<!-- 追加モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">✏️ 支出を追加</h2>

    <div class="form-group">
      <label>内容</label>
      <input type="text" id="inputContent" placeholder="例: ランチ、スーパー…" maxlength="50">
    </div>

    <div class="form-group">
      <label>金額（円）</label>
      <input type="number" id="inputAmount" placeholder="0" min="1" max="9999999">
    </div>

    <div class="form-group">
      <label>カテゴリ</label>
      <select id="inputCat">
        <option value="🍽️ 食費">🍽️ 食費</option>
        <option value="🍜 外食">🍜 外食</option>
        <option value="🚃 交通費">🚃 交通費</option>
        <option value="🎉 娯楽">🎉 娯楽</option>
        <option value="🛒 日用品">🛒 日用品</option>
        <option value="🏠 家賃・光熱費">🏠 家賃・光熱費</option>
        <option value="👗 ファッション">👗 ファッション</option>
        <option value="💊 医療">💊 医療</option>
        <option value="📦 その他">📦 その他</option>
        <option value="💸 精算">💸 精算</option>
      </select>
    </div>

    <div class="form-group">
      <label>誰が払った？</label>
      <div class="tate-group">
        <div class="tate-btn" id="btnKare" onclick="selectTate('kare')">🧑 義也</div>
        <div class="tate-btn" id="btnWatashi" onclick="selectTate('watashi')">👩 志穂</div>
      </div>
    </div>

    <div class="form-group">
      <label>日付</label>
      <input type="date" id="inputDate">
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="submitExpense()">追加する</button>
    <input type="hidden" id="editingId" value="">
    <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<!-- 削除確認 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p><span class="bold" id="confirmContent"></span><br>を削除しますか？</p>
    <div class="confirm-btns">
      <button class="btn-no" onclick="closeConfirm()">キャンセル</button>
      <button class="btn-yes" id="confirmYes">削除</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzFADWT8pFsBoRdMTnxi6asepI37_URZgbhW5fDU_R5hXRJHsDZsmYDxDW9uKAEImMo4g/exec';

  let allData = [];
  let selectedTate = '';
  let currentMonth = '';
  let deleteTargetId = '';

  // 日付文字列を「YYYY-MM-DD」(JST) に正規化
  function toJSTDateStr(val) {
    const s = String(val).replace(/\//g, '-');
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const d = new Date(val);
    if (isNaN(d)) return s.substring(0, 10);
    const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    return jst.toISOString().substring(0, 10);
  }

  // 今月を初期値に
  function initMonth() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    currentMonth = `${y}-${m}`;
    updateMonthLabel();
  }

  function updateMonthLabel() {
    const [y, m] = currentMonth.split('-');
    document.getElementById('monthLabel').textContent = `${y}年${parseInt(m)}月`;
  }

  document.getElementById('prevMonth').addEventListener('click', () => {
    const [y, m] = currentMonth.split('-').map(Number);
    const d = new Date(y, m - 2, 1);
    currentMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    updateMonthLabel();
    renderMonth();
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    const [y, m] = currentMonth.split('-').map(Number);
    const d = new Date(y, m, 1);
    currentMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    updateMonthLabel();
    renderMonth();
  });

  // データ読み込み
  async function loadData() {
    try {
      const res = await fetch(GAS_URL);
      const rows = await res.json();
      // ヘッダー行や不正なデータを除外 + 月フォーマット正規化
      allData = rows.filter(r => r.id && !isNaN(Number(r.amount))).map(r => {
        r.date = toJSTDateStr(r.date);
        if (!/^\d{4}-\d{2}$/.test(String(r.month))) {
          r.month = r.date.substring(0, 7);
        }
        return r;
      });
      renderMonth();
    } catch (e) {
      document.getElementById('expenseList').innerHTML =
        '<div class="empty-state"><div class="emoji">⚠️</div><div>データの読み込みに失敗しました<br><small>' + e.message + '</small></div></div>';
      document.getElementById('settlementText').textContent = '読み込みエラー';
    }
  }

  // 当月データを描画
  function renderMonth() {
    const items = allData.filter(r => r.month === currentMonth);
    renderSummary(items);
    renderList(items);
  }

  function renderSummary(items) {
    const kareTotal = items.filter(r => r.tate === 'kare').reduce((s, r) => s + Number(r.amount), 0);
    const watashiTotal = items.filter(r => r.tate === 'watashi').reduce((s, r) => s + Number(r.amount), 0);
    document.getElementById('kareTotal').textContent = '¥' + kareTotal.toLocaleString();
    document.getElementById('watashiTotal').textContent = '¥' + watashiTotal.toLocaleString();

    const diff = kareTotal - watashiTotal;
    const settle = Math.abs(Math.round(diff / 2));
    const settlementEl = document.getElementById('settlementText');

    if (diff === 0) {
      settlementEl.className = 'settlement balanced';
      settlementEl.innerHTML = '🎉 ぴったり！精算なし';
    } else if (diff > 0) {
      settlementEl.className = 'settlement';
      settlementEl.innerHTML = `志穂 → 義也<br><span class="amount">¥${settle.toLocaleString()}</span>`;
    } else {
      settlementEl.className = 'settlement';
      settlementEl.innerHTML = `義也 → 志穂<br><span class="amount">¥${settle.toLocaleString()}</span>`;
    }
  }

  function renderList(items) {
    const el = document.getElementById('expenseList');
    if (items.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="emoji">🌸</div><div>この月の支出はまだありません</div></div>';
      return;
    }
    // 新しい順に並べる
    const sorted = [...items].sort((a, b) => String(b.date).localeCompare(String(a.date)));
    el.innerHTML = sorted.map(r => {
      const name = r.tate === 'kare' ? '義也' : '志穂';
      const dateStr = String(r.date).substring(0, 10);
      return `
        <div class="expense-item">
          <div class="expense-icon ${r.tate}">${getCatEmoji(r.cat)}</div>
          <div class="expense-info">
            <div class="content">${escHtml(String(r.content))}</div>
            <div class="meta">
              <span>${dateStr}</span>
              <span class="tag">${escHtml(String(r.cat))}</span>
              <span>${name}が払った</span>
            </div>
          </div>
          <div class="expense-right">
            <div class="expense-amount ${r.tate}">¥${Number(r.amount).toLocaleString()}</div>
            <div style="display:flex;gap:2px;">
              <button class="btn-edit" onclick="openEdit('${escHtml(r.id)}')">✏️</button>
              <button class="btn-delete" onclick="askDelete('${escHtml(r.id)}', '${escHtml(String(r.content).replace(/'/g,'\\x27'))}')">🗑️</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function getCatEmoji(cat) {
    const s = String(cat);
    if (s.includes('食費')) return '🍽️';
    if (s.includes('外食')) return '🍜';
    if (s.includes('交通')) return '🚃';
    if (s.includes('娯楽')) return '🎉';
    if (s.includes('日用')) return '🛒';
    if (s.includes('家賃') || s.includes('光熱')) return '🏠';
    if (s.includes('ファッション')) return '👗';
    if (s.includes('医療')) return '💊';
    if (s.includes('精算')) return '💸';
    return '📦';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // モーダル
  document.getElementById('openModal').addEventListener('click', openModal);

  function openModal(item = null) {
    document.getElementById('editingId').value = item ? item.id : '';
    document.getElementById('modalTitle').textContent = item ? '✏️ 支出を編集' : '✏️ 支出を追加';
    document.getElementById('btnSubmit').textContent = item ? '更新する' : '追加する';

    if (item) {
      document.getElementById('inputContent').value = item.content;
      document.getElementById('inputAmount').value = item.amount;
      document.getElementById('inputDate').value = item.date;
      const catSelect = document.getElementById('inputCat');
      for (let i = 0; i < catSelect.options.length; i++) {
        if (catSelect.options[i].value === item.cat) { catSelect.selectedIndex = i; break; }
      }
      selectTate(item.tate);
    } else {
      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth() + 1).padStart(2, '0');
      const d = String(today.getDate()).padStart(2, '0');
      document.getElementById('inputDate').value = `${y}-${m}-${d}`;
      document.getElementById('inputContent').value = '';
      document.getElementById('inputAmount').value = '';
      document.getElementById('inputCat').selectedIndex = 0;
      selectedTate = '';
      document.getElementById('btnKare').className = 'tate-btn';
      document.getElementById('btnWatashi').className = 'tate-btn';
    }
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('inputContent').focus();
  }

  function openEdit(id) {
    const item = allData.find(r => r.id === id);
    if (item) openModal(item);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('editingId').value = '';
    document.getElementById('btnSubmit').textContent = '追加する';
    document.getElementById('modalTitle').textContent = '✏️ 支出を追加';
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  function selectTate(who) {
    selectedTate = who;
    document.getElementById('btnKare').className = 'tate-btn' + (who === 'kare' ? ' selected kare' : '');
    document.getElementById('btnWatashi').className = 'tate-btn' + (who === 'watashi' ? ' selected watashi' : '');
  }

  async function submitExpense() {
    const content = document.getElementById('inputContent').value.trim();
    const amount = Number(document.getElementById('inputAmount').value);
    const cat = document.getElementById('inputCat').value;
    const rawDate = document.getElementById('inputDate').value;
    const date = rawDate.replace(/\//g, '-');

    if (!content) { showToast('内容を入力してください'); return; }
    if (!amount || amount <= 0) { showToast('金額を入力してください'); return; }
    if (!selectedTate) { showToast('誰が払ったか選んでください'); return; }
    if (!date) { showToast('日付を入力してください'); return; }

    const month = date.substring(0, 7);
    const editingId = document.getElementById('editingId').value;
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = '送信中…';

    try {
      if (editingId) {
        const delParams = new URLSearchParams({ action: 'delete', id: editingId });
        await fetch(`${GAS_URL}?${delParams}`);
      }
      const params = new URLSearchParams({ action: 'add', content, amount, cat, tate: selectedTate, date, month });
      const res = await fetch(`${GAS_URL}?${params}`);
      const result = await res.json();
      if (result.success) {
        closeModal();
        showToast(editingId ? '更新しました ✓' : '追加しました ✓');
        await loadData();
      } else {
        showToast('エラーが発生しました');
      }
    } catch (e) {
      showToast('エラーが発生しました: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = editingId ? '更新する' : '追加する';
    }
  }

  // 削除
  function askDelete(id, content) {
    deleteTargetId = id;
    document.getElementById('confirmContent').textContent = content;
    document.getElementById('confirmOverlay').classList.add('open');
  }

  function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('open');
    deleteTargetId = '';
  }

  document.getElementById('confirmYes').addEventListener('click', async () => {
    if (!deleteTargetId) return;
    closeConfirm();
    try {
      const params = new URLSearchParams({ action: 'delete', id: deleteTargetId });
      const res = await fetch(`${GAS_URL}?${params}`);
      const result = await res.json();
      if (result.success) {
        showToast('削除しました');
        await loadData();
      } else {
        showToast('削除に失敗しました');
      }
    } catch (e) {
      showToast('削除に失敗しました: ' + e.message);
    }
  });

  // トースト
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // 起動
  initMonth();
  loadData();
</script>
</body>
</html>
